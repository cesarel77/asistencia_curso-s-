<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Asistencia de Cursos Flask — {{ titulo|default('Inicio') }}</title>
    <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css'
          rel='stylesheet'>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class='bg-light'>
 
  <nav class='navbar navbar-dark bg-primary mb-4'>
    <div class='container'>
      <span class='navbar-brand fw-bold'>
        <i class="bi bi-calendar-check"></i> Asistencia de Cursos Flask
      </span>
      <div class='d-flex gap-3'>
        <a href='/'                  class='nav-link text-white'>Inicio</a>
        <a href='/estudiantes/'      class='nav-link text-white'>Estudiantes</a>
        <a href='/cursos/'           class='nav-link text-white'>Cursos</a>
        <a href='/profesores/'       class='nav-link text-white'>Profesores</a>
        <a href='/asistencias/'      class='nav-link text-white'>Asistencias</a>
        <a href='/sesiones/'         class='nav-link text-white'>Sesiones</a>
        <a href='/periodos/'         class='nav-link text-white'>Periodos</a>
        <a href='/justificaciones/'  class='nav-link text-white'>Justificaciones</a>
      </div>
    </div>
  </nav>
 
  <div class='container pb-5'>
    {% block contenido %}{% endblock %}
  </div>
 
  <script src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js'>
  </script>
</body>
</html>
